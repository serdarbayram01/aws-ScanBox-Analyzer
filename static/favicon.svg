<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- ScanBox Favicon — 16/32px optimized, high contrast -->
  <defs>
    <filter id="fg">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Altıgen dikdörtgen — transparent background -->
  <path d="M11 2 L53 2 L62 32 L53 62 L11 62 L2 32 Z"
        fill="none" stroke="#00ff41" stroke-width="2.5" stroke-opacity=".5"/>

  <!-- Örümcek ağı iplikler — bolder -->
  <line x1="32" y1="32" x2="32" y2="4" stroke="#00ff41" stroke-width="1" opacity=".25"/>
  <line x1="32" y1="32" x2="56" y2="18" stroke="#00ff41" stroke-width="1" opacity=".25"/>
  <line x1="32" y1="32" x2="56" y2="46" stroke="#00ff41" stroke-width="1" opacity=".25"/>
  <line x1="32" y1="32" x2="32" y2="60" stroke="#00ff41" stroke-width="1" opacity=".25"/>
  <line x1="32" y1="32" x2="8" y2="46" stroke="#00ff41" stroke-width="1" opacity=".25"/>
  <line x1="32" y1="32" x2="8" y2="18" stroke="#00ff41" stroke-width="1" opacity=".25"/>

  <!-- Ağ halkaları — thicker, higher opacity -->
  <polygon points="32,9 51,20 51,44 32,55 13,44 13,20" fill="none" stroke="#00ff41" stroke-width="1" opacity=".2"/>
  <polygon points="32,17 43,24 43,40 32,47 21,40 21,24" fill="none" stroke="#00ff41" stroke-width="1" opacity=".25"/>

  <!-- 6 modül noktaları — bigger, brighter -->
  <circle cx="20" cy="12" r="4" fill="#ff9900" opacity=".85"/>
  <circle cx="44" cy="12" r="4" fill="#22c55e" opacity=".85"/>
  <circle cx="54" cy="32" r="4" fill="#3b82f6" opacity=".85"/>
  <circle cx="44" cy="52" r="4" fill="#8b5cf6" opacity=".85"/>
  <circle cx="20" cy="52" r="4" fill="#ef4444" opacity=".85"/>
  <circle cx="10" cy="32" r="4" fill="#06b6d4" opacity=".85"/>

  <!-- SB — large, bold, high contrast -->
  <text x="32" y="38" font-family="monospace" font-size="18" font-weight="900"
        fill="#00ff41" text-anchor="middle" filter="url(#fg)">SB</text>
</svg>